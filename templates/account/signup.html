{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Nueva Dato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Nueva Dato" />
    <meta name="keywords" content="Nueva Dato" />
    <meta content="Themesbrand" name="author" />
    <!-- favicon -->
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" />
    <!-- CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />

    <!-- Iconos -->
    <link href="{% static 'css/materialdesignicons.min.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/pe-icon-7-stroke.css' %}" />

    <link href="{% static 'css/style.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="{% static 'css/colors/red.css' %}" id="color-opt">
</head>

<body>

    <div class="account-home-btn d-none d-sm-block">
        <a href="/" class="text-white"><i class="mdi mdi-home h1"></i></a>
    </div>

    <section class="bg-account-pages vh-100">
        <div class="display-table">
            <div class="display-table-cell">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-5">
                            <div class="card account-card">
                                <div class="card-body">
                                    <div class="text-center mt-3">
                                        <h3 class="fw-bold"><a href="/"
                                                class="text-dark text-uppercase account-pages-logo">Nueva Dato</a></h3>
                                        <p class="text-muted">Regístrate para una nueva cuenta</p>
                                    </div>
                                    <div class="p-3">
                                        <form method="post" action="{% url 'registro' %}">
                                            {% csrf_token %}
                                            <div class="form-group">
                                                <label for="username">Nombre de usuario</label>
                                                <input type="text" class="form-control" id="username"
                                                    name="username" placeholder="Nombre de usuario">
                                            </div>

                                            <div class="form-group">
                                                <label for="email">Correo Electrónico</label>
                                                <input type="email" class="form-control" id="email"
                                                    name="email" placeholder="Ingresa Correo Electrónico">
                                            </div>

                                            <div class="form-group">
                                                <label for="password1">Contraseña</label>
                                                <input type="password" class="form-control" id="password1"
                                                    name="password1" placeholder="Ingresa contraseña">
                                            </div>

                                            <div class="form-group">
                                                <label for="password2">Confirmar Contraseña</label>
                                                <input type="password" class="form-control" id="password2"
                                                    name="password2" placeholder="Confirma tu contraseña">
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value=""
                                                    id="flexCheckDefault">
                                                <label class="form-check-label" for="flexCheckDefault">
                                                    Recuérdame
                                                </label>
                                            </div>

                                            <div class="d-grid mt-3">
                                                <button type="submit" class="btn btn-primary">Registrarse</button>
                                            </div>

                                            <div class="mt-4 mb-0 text-center">
                                                <p class="mb-0">¿Ya tienes una cuenta? <a href="{% url 'login' %}"
                                                        class="text-danger">Iniciar Sesión</a></p>
                                            </div>
                                        </form>
                                        {% if messages %}
                                        {% for message in messages %}
                                        <div class="alert alert-{{ message.tags }}">
                                            {{ message }}
                                        </div>
                                        {% endfor %}
                                        {% endif %}
                                    </div>
                                </div>
                            </div>
                            <!-- fin tarjeta -->
                        </div>
                        <!-- fin columna -->
                    </div>
                    <!-- fin fila -->
                </div>
            </div>
        </div>
    </section>
    <!-- fin de las páginas de cuenta -->

    <!-- JavaScript -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/smooth-scroll.polyfills.min.js' %}"></script>
    <script src="{% static 'js/gumshoe.polyfills.min.js' %}"></script>
    <!-- Principal Js -->
    <script src="{% static 'js/app.js' %}"></script>
</body>

</html>
