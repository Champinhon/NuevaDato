{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Nueva Dato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plantilla Premium de Página de Aterrizaje Bootstrap 5" />
    <meta name="keywords" content="bootstrap 5, premium, marketing, multipropósito" />
    <meta content="Themesbrand" name="author" />
    <!-- favicon -->
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" />
    <!-- CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />

    <!-- Iconos -->
    <link href="{% static 'css/materialdesignicons.min.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/pe-icon-7-stroke.css' %}" />


    <link href="{% static 'css/style.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="{% static 'css/colors/red.css' %}" id="color-opt">
</head>

<body>

    <div class="account-home-btn d-none d-sm-block">
        <a href="/" class="text-white"><i class="mdi mdi-home h1"></i></a>
    </div>

    <section class="bg-account-pages vh-100">
        <div class="display-table">
            <div class="display-table-cell">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-5">
                            <div class="card account-card">
                                <div class="card-body">
                                    <div class="text-center mt-3">
                                        <h3 class="fw-bold"><a href="/"
                                                class="text-dark text-uppercase account-pages-logo">Nueva Dato</a></h3>
                                        <p class="text-muted">Inicia sesión para continuar a NuevaDato.</p>
                                    </div>
                                    <div class="p-3">
                                        <form method="post" action="{% url 'login' %}">
                                            {% csrf_token %}
                                            <div class="form-group">
                                                <label for="username">Nombre de usuario</label>
                                                <input type="text" class="form-control" id="username"
                                                    name="username" placeholder="Ingresa nombre de usuario">
                                            </div>

                                            <div class="form-group">
                                                <label for="password">Contraseña</label>
                                                <input type="password" class="form-control" id="password"
                                                    name="password" placeholder="Ingresa contraseña">
                                            </div>

                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" value=""
                                                    id="flexCheckDefault">
                                                <label class="form-check-label" for="flexCheckDefault">
                                                    Recordarme
                                                </label>
                                            </div>

                                            <div class="d-grid mt-3">
                                                <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                                            </div>

                                            <div class="mt-4 mb-0 text-center">
                                                <a href="password_forget.html" class="text-dark"><i
                                                        class="mdi mdi-lock"></i>¿Olvidaste tu contraseña?</a>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            <!-- end card -->
                        </div>
                        <!-- end col -->
                    </div>
                    <!-- end row -->
                </div>
            </div>
        </div>
        
    </section>
    <!-- end account-pages  -->

    <!-- javascript -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/smooth-scroll.polyfills.min.js' %}"></script>
    <script src="{% static 'js/gumshoe.polyfills.min.js' %}"></script>
    <!-- Main Js -->
    <script src="{% static 'js/app.js' %}"></script>
</body>

</html>
