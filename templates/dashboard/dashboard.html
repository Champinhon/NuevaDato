{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Subir Archivos - NuevaDato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Subir archivos a NuevaDato" />
    <meta name="keywords" content="subir archivos, NuevaDato" />
    <meta content="Themesbrand" name="author" />
    <!-- favicon -->
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" />
    <!-- CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />
    <!-- Iconos -->
    <link href="{% static 'css/materialdesignicons.min.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" type="text/css" href="{% static 'css/pe-icon-7-stroke.css' %}" />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="{% static 'css/colors/red.css' %}" id="color-opt">
</head>
<body>
    <div class="account-home-btn d-none d-sm-block">
        <a href="/" class="text-white"><i class="mdi mdi-home h1"></i></a>
    </div>

    <section class="bg-account-pages vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card account-card">
                        <div class="card-body">
                            <div class="text-center mt-3">
                                <h3 class="fw-bold"><a href="/" class="text-dark text-uppercase account-pages-logo">NuevaDato</a></h3>
                                <p class="text-muted">Subir Archivos</p>
                            </div>
                            <div class="p-3">
                                <h2>Hacer Preguntas</h2>
                                <form method="post">
                                    {% csrf_token %}
                                    <div class="form-group">
                                        <label for="prompt_question">Ingresa tu pregunta:</label>
                                        <input type="text" class="form-control" id="prompt_question" name="prompt_question" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Hacer Pregunta</button>
                                </form>
                            </div>
                            <script src="https://cdn.jsdelivr.net/npm/chart.js@4.2.1/dist/chart.umd.min.js"></script>
                            <canvas id="chart"></canvas>
                            <script>
                                let ctx = document.getElementById("chart").getContext("2d");
                                let chart = new Chart(ctx, {
                                type: "bar",
                                data: {
                                labels: ["2020/Q1", "2020/Q2", "2020/Q3", "2020/Q4"],
                                datasets: [
                                    {
                                    label: "Gross volume ($)",
                                    backgroundColor: "#79AEC8",
                                    borderColor: "#417690",
                                    data: [26900, 28700, 27300, 29200]
                                    }
                                ]
                                },
                                options: {
                                title: {
                                    text: "Gross Volume in 2020",
                                    display: true
                                }
                                }
                                });
                            </script>
                            <div class="container">
                                <button type="button" class="btn btn-primary">
                                    <a href="{% url 'upload_file' %}" class="nav-link">Subir archivo</a>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScript -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/smooth-scroll.polyfills.min.js' %}"></script>
    <script src="{% static 'js/gumshoe.polyfills.min.js' %}"></script>
    <!-- Principal Js -->
    <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
