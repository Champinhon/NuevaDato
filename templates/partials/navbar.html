{% load static %}

{% block navbar %}
<!-- STRAT NAVBAR -->
<div id="navbar">
    <nav class="navbar navbar-expand-lg fixed-top navbar-custom sticky sticky-dark">
        <div class="container">
            <!-- LOGO -->
            <a class="navbar-brand logo text-uppercase" href="/">
                NuevaDato
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
                aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                <i class="mdi mdi-menu"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav navbar-center" id="navbar-navlist">
                    <li class="nav-item">
                        <a data-scroll href="{% url 'index' %}" class="nav-link">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="#services" class="nav-link">Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="#features" class="nav-link">Características</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="#pricing" class="nav-link">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="#contact" class="nav-link">Contacto</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a data-scroll href="{% url 'dashboard' %}" class="nav-link">Panel de control</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="{% url 'logout' %}" class="nav-link">Cerrar sesión</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a data-scroll href="{% url 'login' %}" class="nav-link">Iniciar sesión</a>
                    </li>
                    <li class="nav-item">
                        <a data-scroll href="{% url 'registro' %}" class="nav-link">Registro</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
</div>
<!-- END NAVBAR -->
{% endblock navbar %}
